<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脳汁スロット</title>
<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial, sans-serif;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px red;
}

#reels {
  font-size: 60px;
  margin: 20px;
  letter-spacing: 20px;
}

button {
  font-size: 20px;
  padding: 10px 20px;
  background: red;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 10px;
}

button:hover {
  background: orange;
}

.flash {
  animation: flash 0.2s infinite;
}

@keyframes flash {
  0% { background: black; }
  50% { background: red; }
  100% { background: black; }
}

#log {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>
<body>

<h1>🔥 脳汁スロット 🔥</h1>
<div id="reels">❓ ❓ ❓</div>
<button onclick="spin()">回す！</button>
<div id="log"></div>

<audio id="winSound" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg"></audio>
<audio id="spinSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
const symbols = ["🍒","🔔","💎","7️⃣","🍉"];

function randomSymbol() {
  return symbols[Math.floor(Math.random() * symbols.length)];
}

function spin() {
  document.getElementById("spinSound").play();

  let reels = ["❓","❓","❓"];
  let display = document.getElementById("reels");

  let count = 0;
  let interval = setInterval(() => {
    reels = [randomSymbol(), randomSymbol(), randomSymbol()];
    display.innerText = reels.join(" ");
    count++;

    if (count > 15) {
      clearInterval(interval);
      result(reels);
    }
  }, 100);
}

function result(reels) {
  let log = document.getElementById("log");

  if (reels[0] === reels[1] && reels[1] === reels[2]) {
    // JACKPOT
    document.body.classList.add("flash");
    document.getElementById("winSound").play();
    log.innerHTML = "🎉 JACKPOT!!! 脳汁ドバドバ!!! 🎉";

    setTimeout(() => {
      document.body.classList.remove("flash");
    }, 2000);

  } else if (reels[0] === reels[1] || reels[1] === reels[2]) {
    log.innerHTML = "✨ 惜しい！もう一回！";
  } else {
    log.innerHTML = "😢 ハズレ...";
  }
}
</script>

</body>
</html>
